<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lily with Milk</title>
  <style>
    :root {
      --bg: #ffffff;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-muted: #777777;
      --border: #ececec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text-primary);
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(92vw, 720px);
      text-align: center;
      padding: 40px 24px 28px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .logo {
      width: min(300px, 62vw);
      height: auto;
      display: block;
      margin: 0;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.12));
      animation: logoIn 0.8s ease-out;
    }

    .logo-wrap {
      position: relative;
      display: inline-block;
      margin: 0 auto 18px;
      line-height: 0;
      overflow: hidden;
    }

    .logo-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        rgba(255, 255, 255, 0) 30%,
        rgba(255, 255, 255, 0.5) 48%,
        rgba(255, 255, 255, 0) 66%
      );
      transform: translateX(-130%);
      animation: shimmer 5.2s ease-in-out 1s infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    @keyframes logoIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-130%);
      }
      55%,
      100% {
        transform: translateX(130%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo,
      .logo-wrap::after {
        animation: none;
      }
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    h2 {
      margin: 4px 0 18px;
      font-size: clamp(1rem, 2.3vw, 1.25rem);
      color: #2f2f2f;
      font-weight: 500;
    }

    p {
      margin: 0;
      font-size: clamp(0.98rem, 2.1vw, 1.08rem);
      color: var(--text-secondary);
    }

    .contact {
      margin-top: 18px;
      font-size: 0.84rem;
      color: var(--text-muted);
      letter-spacing: 0.01em;
    }

    @media (max-width: 480px) and (orientation: portrait) {
      body {
        padding: 16px;
      }

      main {
        width: 100%;
        padding: 28px 16px 22px;
        border-radius: 16px;
      }

      .logo {
        width: min(260px, 78vw);
      }

      .logo-wrap {
        margin-bottom: 14px;
      }

      h1 {
        font-size: clamp(2rem, 10vw, 2.5rem);
        line-height: 1.12;
      }

      h2 {
        margin: 6px 0 14px;
        font-size: 0.95rem;
      }

      p {
        font-size: 0.95rem;
        line-height: 1.62;
      }

      .contact {
        margin-top: 14px;
        font-size: 0.78rem;
      }

      .contact a {
        word-break: break-all;
      }
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #cfcfcf;
    }

    a:hover {
      border-bottom-color: #999999;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo-wrap">
      <img src="LilyAndMilk_color.png" alt="소녀와 고양이 로고" class="logo" />
    </div>
    <h1>Lily with Milk</h1>
    <h2>Developer Page</h2>
    <p>We build apps and games with care, simplicity, and delightful user experiences.</p>
    <div class="contact">
      Contact: <a href="mailto:lilywithmilk@gmail.com">lilywithmilk@gmail.com</a>
    </div>
  </main>
</body>
</html>
